<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout — Lofty Store</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<div class="page">
  <nav class="nav glass">
    <a href="index.html" class="nav-brand">Lofty Store</a>
    <div class="nav-breadcrumb">
      <span>Cart</span><span class="sep">→</span><span class="active">Checkout</span><span class="sep">→</span><span>Confirmation</span>
    </div>
  </nav>

  <div class="checkout-wrap">
    <h1 class="checkout-title">Checkout</h1>

    <div id="emptyNotice" style="display:none; color:rgba(255,255,255,0.65); font-size:15px; margin-bottom:24px;">
      Your cart is empty. <a href="index.html" style="color:#fff; text-decoration:underline;">Go back to shopping</a>.
    </div>

    <form class="checkout-grid" id="checkoutForm">
      <div class="checkout-forms">

        <div class="form-card glass">
          <div class="form-card-title">Contact</div>
          <input class="form-input" type="email" name="email" placeholder="Email address" required>
          <div class="field-error">Enter a valid email address.</div>
        </div>

        <div class="form-card glass">
          <div class="form-card-title">Shipping address</div>
          <div class="form-row-2">
            <input class="form-input" type="text" name="firstName" placeholder="First name" required>
            <input class="form-input" type="text" name="lastName" placeholder="Last name" required>
          </div>
          <input class="form-input" type="text" name="address" placeholder="Address" required style="margin-bottom:12px;">
          <input class="form-input" type="text" name="city" placeholder="City" required>
        </div>

        <div class="form-card glass">
          <div class="form-card-title">Shipping method</div>
          <div style="display:flex; flex-direction:column; gap:10px;" id="shipOptions"></div>
        </div>

        <div class="form-card glass">
          <div class="form-card-title">Payment</div>
          <div style="display:flex; align-items:center; gap:12px; padding:16px 18px; border-radius:16px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.4);">
            <div class="ship-dot" style="border-color:#fff;"><div class="ship-dot-fill" style="display:block;"></div></div>
            <div>
              <div class="ship-name">Cash on Delivery</div>
              <div class="ship-eta">Pay with cash when your order arrives.</div>
            </div>
          </div>
        </div>

      </div>

      <div class="summary-card glass">
        <div class="summary-title">Order summary</div>
        <div class="summary-lines" id="summaryLines"></div>
        <div class="summary-divider"></div>
        <div class="summary-totals">
          <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal"></span></div>
          <div class="summary-row"><span>Shipping</span><span id="sumShipping"></span></div>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-grand">
          <div class="summary-grand-label">Total</div>
          <div class="summary-grand-value" id="sumTotal"></div>
        </div>
        <button type="submit" class="pay-btn pill-primary" id="payBtn">Place order</button>
      </div>
    </form>
  </div>
</div>

<script src="assets/store.js"></script>
<script src="assets/checkout.js"></script>
</body>
</html>
